services:
  web:
    build: .
    container_name: ai-juniors-web
    restart: unless-stopped
    init: true
    env_file:
      - .env
    ports:
      - "127.0.0.1:9124:3000"
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 384m
    cpus: 1.0
    healthcheck:
      test:
        - CMD
        - wget
        - -q
        - --spider
        - http://127.0.0.1:3000/healthz
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
